# Overra portal — nginx reverse proxy.
#
# Install:
#   sudo cp deploy/nginx-overra.conf /etc/nginx/sites-available/overra
#   sudo sed -i 's/__DOMAIN__/portal.example.com/g' /etc/nginx/sites-available/overra
#   sudo ln -s /etc/nginx/sites-available/overra /etc/nginx/sites-enabled/overra
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d portal.example.com   # adds the :443 block + HTTP->HTTPS redirect
#
# certbot rewrites this file in place to add TLS. After it runs, set
# NEXTAUTH_URL / APP_URL to https://__DOMAIN__ in .env.production and
# restart overra-portal.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Agent auth payloads + installer downloads are small; cap uploads.
    client_max_body_size 2m;

    # Hide nginx version.
    server_tokens off;

    # ---------------------------------------------------------------
    # Server-Sent Events stream. The portal pushes device/status/log
    # events over a long-lived /api/events connection. nginx MUST NOT
    # buffer or time this out, or real-time updates silently stall.
    # ---------------------------------------------------------------
    location = /api/events {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        24h;
        chunked_transfer_encoding off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
